<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sleeping Gods</title>

<style>

body{
background:#0f0f0f;
color:#d8d8d8;
font-family:Consolas, monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.caja{
width:500px;
border:1px solid #555;
padding:40px;
background:#181818;
}

input{
width:100%;
padding:12px;
margin-top:20px;
background:black;
color:white;
border:1px solid gray;
}

button{
margin-top:20px;
padding:12px;
width:100%;
cursor:pointer;
}

#poema{
margin-top:30px;
white-space:pre-line;
}

</style>

</head>

<body>

<div class="caja">

<h2>Sleeping Gods Archive</h2>

<p>Ingrese la clave de acceso.</p>

<input id="codigo">

<button onclick="comprobar()">
Validar
</button>

<div id="poema"></div>

</div>

<script>

const archivos = {

"KILLA": `
<hr>

<h3>Registro encontrado</h3>

Es imposible saber dónde se hallan.
Se ocultaron de todo ser a plena vista;
son fáciles de ver, pero nunca fáciles de entender.

Antes, en nuestros cielos;
ahora, en nuestros suelos,
ocultos y adormilados,
están encontrando trucos y juegos
para salir de su encierro.

Es importante que te protejas de ellos,
pues no dudarán en atacar tus cimientos.
Esconde tus miedos y tus deseos;
ellos los concederán,
pero no de la forma que tú conoces.

Se encarnarán en tu piel
hasta que no quede nada de tu ser.
Chuparán y quebrarán
hasta extraer todo de ti.

Ellos no son buenos.
Atacarán a los fuertes,
y cuando la última barrera caiga,
manipularán a los débiles
para poder nacer de nuevo
y así poner fin a nuestra melódica armonía.

Cuida tu conciencia y tu psique.
De ellos no hables,
no los mires,
no los pienses.

Ellos no son tangibles... aún.
`,

"JASPER": `
<hr>
<h3>Registro encontrado</h3>
Jasper es una persona sencilla...
la mayoria de las veces sigue a su hermano
y mika lo pendejea mucho.
Aun asi no recomendaria molestarlo...
Canta en el baño pero si le dices lo mas probable
es que lo niegue.
`,

"ZEDRICK": `
<hr>
<h3>Registro encontrado</h3>
Zedrick...
una persona de caracter muy fuerte, irresponsable
pero aun asi cuida a su hermano como a nada en la vida
aveces alguien tan desastroso es lo que falta en un equipo
aunque nadie le quita lo hijo de p
No le gusta nada los "HDP" pero aun asi va a los conciertos
a echar desmadre
`,

"MILLER": `
<hr>
<h3>Registro encontrado</h3>
Miller es una persona con mucho talento
y un amor por el arte excepcional...
aunque siempre trata de impresionar
el es la unica persona que nunca
se sorprende.
Dice que odia el rock por que toca musica
clasica, pero en realidad lo ama.
`,

"MIKA": `
<hr>
<h3>Registro encontrado</h3>
Mikka es una mujer muy fuerte
aunque ella sea la unica persona que no lo cree
a pasado por muchas dificultades pero aun asi..
es la persona mas alegre del equipo.
Sabe hacer el pino y es muy mala en los juegos
`,

"EDHA": `
<hr>
<h3>Registro encontrado</h3>
Erradica
`,

"MAYOREMAY": `
<hr>
<h3>Registro encontrado</h3>
Director de Sleeping Gods, PuzzleMaker
Y por que me buscas a mi? wtf.
Gracias por seguir la novela, sleeping gods es
una de las cosas que mas me hacia ilusion.
es un mundo muy grande y lleno de mucho potencial,
Cada minuto trabajando en esto se sintio como una
recompensa, Gracias por apoyar SG, y buena suerte
con los codigos. SEE YALL
`,

"EMLEX": `
<hr>
<h3>Registro encontrado</h3>
Creador de Sleeping Gods, CoDirector
Si llegaste hasta aquí, felicidades, Dios ya te abandonó
pero no esta tan mal, se cocinar arroz y aamm... arroz.
Sigue buscando los secretos de este gran mundo,
aunque pueden estar frente a ti, Suerte!!
`,

"CAP": `
<hr>
<h3>Registro encontrado</h3>
CoCreador de Sleeping Gods

`,

"NAIN": `
<hr>
<h3>Registro encontrado</h3>
Artista Principal de Sleeping Gods

`

};

function comprobar(){

let codigo = document.getElementById("codigo").value.toUpperCase().trim();

if(archivos[codigo]){

document.getElementById("poema").innerHTML = archivos[codigo];

}else{

document.getElementById("poema").innerHTML = `
<hr>
<h3>Acceso denegado</h3>
La clave introducida no existe.
`;

}

}

</script>

</body>
</html>
